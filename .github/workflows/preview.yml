# hermes-zh — Preview Deploy Skeleton
# PR 触发：构建站点 → 上传 artifact → 评论 PR 构建状态
#
# 当前边界：这里只证明“PR 可构建”，还不等于“已有真实 preview 部署 URL”。
# 后续演进路径：
#   1. 接入 Vercel Preview / Cloudflare Pages 做真实预览 URL
#   2. 让 PR 评论回传 preview URL + site sha + content sha
#   3. 接入 Playwright / Lighthouse CI 做视觉回归
name: preview

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout hermes-zh (site repo)
        uses: actions/checkout@v4

      - name: Checkout awesome-hermes-agent-zh (content repo)
        uses: actions/checkout@v4
        with:
          repository: zcweah1981/awesome-hermes-agent-zh
          path: _content_repo
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build site
        run: npm run build
        env:
          CONTENT_REPO_PATH: ${{ github.workspace }}/_content_repo

      - name: Smoke
        run: npm run smoke

      - name: Verify content manifests
        run: npm run verify:content

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.pull_request.number }}
          path: .next/
          retention-days: 7

      - name: Comment PR with build status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## ✅ Preview Build Ready

            Build artifacts uploaded for this PR.

            | Item | Detail |
            |------|--------|
            | Commit | \`${context.sha.slice(0, 7)}\` |
            | Run | [View logs](${runUrl}) |
            | Artifact | \`preview-build-${pr.number}\` |
            | Content | synced from \`awesome-hermes-agent-zh@main\` |

            > 🏗️ Current scope: build artifact only. Next step is wiring a real preview deploy target (Vercel / CF Pages).
            `
            });
