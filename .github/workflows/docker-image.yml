name: docker-image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hermes-zh (site repo)
        uses: actions/checkout@v4

      - name: Checkout awesome-hermes-agent-zh (content repo)
        uses: actions/checkout@v4
        with:
          repository: zcweah1981/awesome-hermes-agent-zh
          path: _content_repo
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build site
        run: npm run build
        env:
          CONTENT_REPO_PATH: ${{ github.workspace }}/_content_repo

      - name: Smoke
        run: npm run smoke

      - name: Verify content manifests
        run: npm run verify:content

      - name: Verify content freshness
        run: npm run verify:content:freshness
        env:
          CONTENT_REPO_PATH: ${{ github.workspace }}/_content_repo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
