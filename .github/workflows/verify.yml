# hermes-zh — Verify Pipeline
# PR / push 触发：checkout 双仓库 → typecheck → build (含 content sync) → verify content manifests
name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hermes-zh (site repo)
        uses: actions/checkout@v4

      - name: Checkout awesome-hermes-agent-zh (content repo)
        uses: actions/checkout@v4
        with:
          repository: zcweah1981/awesome-hermes-agent-zh
          path: _content_repo
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (content sync + manifests + next build)
        run: npm run build
        env:
          CONTENT_REPO_PATH: ${{ github.workspace }}/_content_repo

      - name: Smoke
        run: npm run smoke

      - name: Verify content manifests
        run: npm run verify:content

      - name: Verify content freshness
        run: npm run verify:content:freshness
